<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>AI Hujaifa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f5f0e8;
      --border:    rgba(160,140,120,0.2);
      --accent:    #cc785c;
      --accent2:   #b5614a;
      --text:      #2d2519;
      --text-muted:#8a7d6e;
      --bot-bubble:#eee8de;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 740px;
      margin: 0 auto;
      position: relative;
    }

    /* HEADER */
    .header {
      flex-shrink: 0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(245,240,232,0.97);
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 14px;
      background: linear-gradient(145deg,#f5ede8,#e8d5c8);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(204,120,92,0.2);
      position: relative;
    }

    .status-dot {
      width: 10px; height: 10px;
      background: #5dbb6e;
      border-radius: 50%;
      border: 2px solid var(--bg);
      position: absolute; bottom: -1px; right: -1px;
    }

    .header-info h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 700;
      color: var(--text);
    }
    .header-info p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-pill {
      margin-left: auto;
      background: rgba(204,120,92,0.1);
      border: 1px solid rgba(204,120,92,0.3);
      color: var(--accent2);
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
    }

    /* MESSAGES */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .date-chip {
      align-self: center;
      font-size: 11px; color: var(--text-muted);
      background: rgba(0,0,0,0.05);
      padding: 3px 12px; border-radius: 20px;
      margin: 6px 0;
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 80%;
    }

    .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-row.bot  { align-self: flex-start; }

    .msg-av {
      width: 30px; height: 30px;
      border-radius: 10px;
      background: linear-gradient(145deg,#f5ede8,#e8d5c8);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .msg-av.ghost { visibility: hidden; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px; line-height: 1.55;
      max-width: 100%; word-break: break-word;
    }

    .message-row.user .bubble {
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message-row.bot .bubble {
      background: var(--bot-bubble); color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    /* TYPING */
    .typing-row {
      display: flex; align-items: flex-end; gap: 8px;
      align-self: flex-start;
    }
    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-bubble span {
      width: 6px; height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      animation: bounce 1.3s infinite;
      opacity: 0.6;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity:.5; }
      30% { transform: translateY(-5px); opacity:1; }
    }

    /* INPUT */
    .input-area {
      flex-shrink: 0;
      padding: 10px 14px 16px;
      background: rgba(245,240,232,0.98);
      border-top: 1px solid var(--border);
    }

    .input-box {
      display: flex; align-items: flex-end; gap: 8px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 8px 8px 8px 16px;
    }
    .input-box:focus-within {
      border-color: rgba(204,120,92,0.5);
      box-shadow: 0 0 0 3px rgba(204,120,92,0.08);
    }

    #messageInput {
      flex: 1;
      background: transparent; border: none; outline: none;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      resize: none; line-height: 1.5;
      max-height: 100px; overflow-y: auto;
      padding: 2px 0;
    }
    #messageInput::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg,#cc785c,#e8956d);
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(204,120,92,0.35);
    }
    .send-btn:active { transform: scale(.93); }
    .send-btn:disabled { opacity: .35; box-shadow: none; }

    @media(max-width:600px) {
      .header-pill { display: none; }
      .message-row { max-width: 88%; }
    }
  </style>
</head>
<body>
<div class="chat-container">

  <div class="header">
    <div class="avatar">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <rect x="2" y="3" width="22" height="17" rx="5" fill="#cc785c"/>
        <path d="M6 20 L4 26 L12 22" fill="#cc785c"/>
        <circle cx="8" cy="11.5" r="2" fill="white" opacity="0.9"/>
        <circle cx="13" cy="11.5" r="2" fill="white" opacity="0.9"/>
        <circle cx="18" cy="11.5" r="2" fill="white" opacity="0.9"/>
        <rect x="14" y="14" width="16" height="12" rx="4" fill="#e8a88a" opacity="0.85"/>
        <circle cx="19" cy="20" r="1.4" fill="white" opacity="0.9"/>
        <circle cx="23" cy="20" r="1.4" fill="white" opacity="0.9"/>
        <circle cx="27" cy="20" r="1.4" fill="white" opacity="0.9"/>
      </svg>
      <div class="status-dot"></div>
    </div>
    <div class="header-info">
      <h1>AI Hujaifa</h1>
      <p>Always here to chat</p>
    </div>
    <div class="header-pill">● Online</div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="date-chip">Today</div>
    <div class="message-row bot">
      <div class="msg-av">
        <svg width="17" height="17" viewBox="0 0 32 32" fill="none">
          <rect x="2" y="3" width="22" height="17" rx="5" fill="#cc785c"/>
          <path d="M6 20 L4 26 L12 22" fill="#cc785c"/>
          <circle cx="8" cy="11.5" r="2" fill="white" opacity="0.9"/>
          <circle cx="13" cy="11.5" r="2" fill="white" opacity="0.9"/>
          <circle cx="18" cy="11.5" r="2" fill="white" opacity="0.9"/>
          <rect x="14" y="14" width="16" height="12" rx="4" fill="#e8a88a" opacity="0.85"/>
          <circle cx="19" cy="20" r="1.4" fill="white" opacity="0.9"/>
          <circle cx="23" cy="20" r="1.4" fill="white" opacity="0.9"/>
          <circle cx="27" cy="20" r="1.4" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div class="bubble">Hey! What's up? I'm AI Hujaifa — let's talk about anything 👋</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="messageInput" rows="1" placeholder="Message AI Hujaifa..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>
<script>
  const ICON = `<svg width="17" height="17" viewBox="0 0 32 32" fill="none"><rect x="2" y="3" width="22" height="17" rx="5" fill="#cc785c"/><path d="M6 20 L4 26 L12 22" fill="#cc785c"/><circle cx="8" cy="11.5" r="2" fill="white" opacity="0.9"/><circle cx="13" cy="11.5" r="2" fill="white" opacity="0.9"/><circle cx="18" cy="11.5" r="2" fill="white" opacity="0.9"/><rect x="14" y="14" width="16" height="12" rx="4" fill="#e8a88a" opacity="0.85"/><circle cx="19" cy="20" r="1.4" fill="white" opacity="0.9"/><circle cx="23" cy="20" r="1.4" fill="white" opacity="0.9"/><circle cx="27" cy="20" r="1.4" fill="white" opacity="0.9"/></svg>`;

  const input = document.getElementById('messageInput');
  const area = document.getElementById('messagesArea');
  const sendBtn = document.getElementById('sendBtn');
  const SID = 'sess_' + Math.random().toString(36).substr(2,9);

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function addMsg(text, sender) {
    const row = document.createElement('div');
    row.className = 'message-row ' + sender;
    if (sender === 'bot') {
      const av = document.createElement('div');
      av.className = 'msg-av';
      av.innerHTML = ICON;
      const prev = area.lastElementChild;
      if (prev?.classList.contains('bot')) av.classList.add('ghost');
      row.appendChild(av);
    }
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    row.appendChild(b);
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  function showTyping() {
    const r = document.createElement('div');
    r.className = 'typing-row'; r.id = 'typing';
    r.innerHTML = `<div class="msg-av">${ICON}</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
    area.appendChild(r);
    area.scrollTop = area.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = ''; input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ message: text, session_id: SID })

      });
      const data = await res.json();
      hideTyping();
      addMsg(data.reply, 'bot');
    } catch {
      hideTyping();
      addMsg('Something went wrong, try again!', 'bot');
    }
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
